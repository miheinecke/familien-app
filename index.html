<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familie Heinecke - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #57856F;
            --button-green: #A1BFB0;
            --dark-green: #3D6350;
            --light-bg: #E8F0EB;
            --text-dark: #3B3B3B;
            --text-muted: #6b7b72;
            --white: #FFFFFF;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        html, body {
            height: 100%;
            font-family: 'Comfortaa', sans-serif;
            background-color: var(--light-bg);
            color: var(--text-dark);
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--dark-green) 100%);
            padding: 20px;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-container {
            background: var(--white);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: var(--shadow-card);
            text-align: center;
            max-width: 300px;
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .login-title {
            font-family: 'Oswald', sans-serif;
            font-size: 28px;
            color: var(--primary-green);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .google-login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            background: var(--primary-green);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-family: 'Comfortaa', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .google-login-btn:hover {
            background: var(--dark-green);
        }

        .google-icon {
            font-size: 20px;
        }

        /* Main App */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .app-container.hidden {
            display: none;
        }

        /* Header */
        header {
            background: var(--primary-green);
            color: var(--white);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: relative;
        }

        .header-title {
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            font-weight: 700;
            flex: 1;
        }

        .sync-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            margin: 0 12px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: var(--white);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Comfortaa', sans-serif;
            font-size: 12px;
            transition: background 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 70px;
            -webkit-overflow-scrolling: touch;
        }

        .content-wrapper {
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
        }

        /* Tabs */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Bottom Navigation */
        nav.bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            border-top: 1px solid #E0E0E0;
            display: flex;
            justify-content: space-around;
            padding: max(12px, env(safe-area-inset-bottom, 12px)) 0 12px;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.08);
            max-width: 480px;
            margin: 0 auto;
            width: 100vw;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 12px;
            text-decoration: none;
            border: none;
            background: none;
            font-family: 'Comfortaa', sans-serif;
            transition: color 0.3s ease;
        }

        .nav-item.active {
            color: var(--primary-green);
        }

        .nav-item-icon {
            font-size: 24px;
        }

        /* Menu Tab */
        .day-filter {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 20px;
            padding-bottom: 8px;
        }

        .day-chip {
            padding: 8px 14px;
            border: 2px solid var(--button-green);
            background: var(--white);
            color: var(--primary-green);
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.3s ease;
            font-family: 'Oswald', sans-serif;
        }

        .day-chip.active {
            background: var(--primary-green);
            color: var(--white);
            border-color: var(--primary-green);
        }

        .day-chip:hover {
            border-color: var(--primary-green);
        }

        .day-card {
            background: var(--white);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .day-header {
            background: var(--primary-green);
            color: var(--white);
            padding: 16px;
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            font-weight: 700;
        }

        .day-header.weekend {
            background: var(--dark-green);
        }

        .day-date {
            font-size: 14px;
            font-weight: 400;
            opacity: 0.9;
        }

        .meals {
            padding: 12px 0;
        }

        .meal {
            padding: 12px 16px;
            border-bottom: 1px solid #F0F0F0;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .meal:last-child {
            border-bottom: none;
        }

        .meal:hover {
            background: var(--light-bg);
        }

        .meal-type {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meal-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-green);
            margin: 6px 0;
        }

        .meal-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .meal-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: var(--light-bg);
            padding: 0 16px;
        }

        .meal-details.expanded {
            max-height: 500px;
            padding: 12px 16px;
        }

        .meal-details h4 {
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            color: var(--primary-green);
            margin: 12px 0 6px;
            font-weight: 700;
        }

        .meal-details p, .meal-details ul {
            font-size: 13px;
            color: var(--text-dark);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .meal-details ul {
            margin-left: 16px;
        }

        .meal-details li {
            margin-bottom: 4px;
        }

        /* Shopping Tab */
        .progress-section {
            margin-bottom: 20px;
        }

        .progress-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #E0E0E0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-green);
            transition: width 0.3s ease;
        }

        .reset-btn {
            padding: 8px 12px;
            background: var(--button-green);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-family: 'Comfortaa', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .reset-btn:hover {
            background: var(--primary-green);
        }

        .category {
            margin-bottom: 20px;
        }

        .category-header {
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-green);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-emoji {
            font-size: 20px;
        }

        .shopping-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--white);
            border-radius: 8px;
            margin-bottom: 8px;
            box-shadow: var(--shadow);
        }

        .shopping-item.completed {
            opacity: 0.6;
        }

        .shopping-item.completed .item-label {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .shopping-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary-green);
        }

        .item-label {
            flex: 1;
            font-size: 14px;
            color: var(--text-dark);
        }

        /* Todos Tab */
        .todo-form {
            background: var(--white);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 8px;
        }

        .todo-input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--light-bg);
            border-radius: 8px;
            font-family: 'Comfortaa', sans-serif;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .todo-input:focus {
            outline: none;
            border-color: var(--primary-green);
        }

        .who-selector {
            display: flex;
            gap: 8px;
        }

        .who-chip {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--light-bg);
            background: var(--white);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.3s ease;
            font-family: 'Comfortaa', sans-serif;
            text-align: center;
            color: var(--text-dark);
        }

        .who-chip.selected {
            background: var(--primary-green);
            color: var(--white);
            border-color: var(--primary-green);
        }

        .who-chip:hover {
            border-color: var(--primary-green);
        }

        .add-todo-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-green);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-family: 'Comfortaa', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 12px;
        }

        .add-todo-btn:hover {
            background: var(--dark-green);
        }

        .todos-section {
            margin-bottom: 24px;
        }

        .todos-section-title {
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-green);
            margin-bottom: 12px;
        }

        .todo-item {
            background: var(--white);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            box-shadow: var(--shadow);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: var(--primary-green);
            flex-shrink: 0;
        }

        .todo-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .todo-text {
            font-size: 14px;
            color: var(--text-dark);
            font-weight: 700;
        }

        .todo-who {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .todo-delete {
            background: none;
            border: none;
            color: #d32f2f;
            cursor: pointer;
            font-size: 20px;
            padding: 0;
            line-height: 1;
            flex-shrink: 0;
            transition: color 0.3s ease;
        }

        .todo-delete:hover {
            color: #b71c1c;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                max-width: 100%;
            }

            nav.bottom-nav {
                width: 100%;
                left: 0;
                right: 0;
            }

            .content-wrapper {
                padding: 16px;
            }
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid var(--light-bg);
            border-top-color: var(--primary-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

            onValue(shoppingRef, (snapshot) => {
                let shoppingState = snapshot.val() || {};

                // Initialize if empty
                if (Object.keys(shoppingState).length === 0) {
                    shoppingState = {};
                    Object.entries(shoppingDataInitial).forEach((catEntry, catIndex) => {
                        catEntry[1].items.forEach((item, itemIndex) => {
                            shoppingState[`${catIndex}-${itemIndex}`] = false;
                        });
                    });
                    set(shoppingRef, shoppingState);
                }

                renderShopping(shoppingState);
            });
        }

        function renderShopping(shoppingState) {
            const container = document.getElementById('shoppingContent');
            container.innerHTML = '';

            let totalItems = 0;
            let completedItems = 0;

            Object.entries(shoppingDataInitial).forEach((catEntry, catIndex) => {
                const [catName, catData] = catEntry;
                const category = document.createElement('div');
                category.className = 'category';

                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `<span class="category-emoji">${catData.emoji}</span><span>${catName}</span>`;
                category.appendChild(header);

                catData.items.forEach((item, itemIndex) => {
                    const key = `${catIndex}-${itemIndex}`;
                    const isChecked = shoppingState[key] || false;
                    totalItems++;
                    if (isChecked) completedItems++;

                    const itemEl = document.createElement('div');
                    itemEl.className = 'shopping-item' + (isChecked ? ' completed' : '');

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'shopping-checkbox';
                    checkbox.checked = isChecked;
                    checkbox.addEventListener('change', () => {
                        updateShopping(key, checkbox.checked);
                    });

                    const label = document.createElement('div');
                    label.className = 'item-label';
                    label.textContent = item;

                    itemEl.appendChild(checkbox);
                    itemEl.appendChild(label);
                    category.appendChild(itemEl);
                });

                container.appendChild(category);
            });

            // Update progress
            const progressLabel = document.getElementById('progressLabel');
            const progressFill = document.getElementById('progressFill');
            progressLabel.textContent = `${completedItems} von ${totalItems} erledigt`;
            progressFill.style.width = totalItems > 0 ? `${(completedItems / totalItems) * 100}%` : '0%';

            // Reset button
            document.getElementById('resetBtn').onclick = () => {
                const shoppingRef = ref(db, 'shopping');
                set(shoppingRef, {});
            };
        }
