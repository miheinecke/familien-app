<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familie Heinecke - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #57856F;
            --button-green: #A1BFB0;
            --dark-green: #3D6350;
            --light-bg: #E8F0EB;
            --text-dark: #3B3B3B;
            --text-muted: #6b7b72;
            --white: #FFFFFF;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        html, body {
            height: 100%;
            font-family: 'Comfortaa', sans-serif;
            background-color: var(--light-bg);
            color: var(--text-dark);
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--dark-green) 100%);
            padding: 20px;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-container {
            background: var(--white);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: var(--shadow-card);
            text-align: center;
            max-width: 300px;
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .login-title {
            font-family: 'Oswald', sans-serif;
            font-size: 28px;
            color: var(--primary-green);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .google-login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            background: var(--primary-green);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-family: 'Comfortaa', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .google-login-btn:hover {
            background: var(--dark-green);
        }

        .google-icon {
            font-size: 20px;
        }

        /* Main App */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .app-container.hidden {
            display: none;
        }

        /* Header */
        header {
            background: var(--primary-green);
            color: var(--white);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: relative;
        }

        .header-title {
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            font-weight: 700;
            flex: 1;
        }

        .sync-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            margin: 0 12px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: var(--white);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Comfortaa', sans-serif;
            font-size: 12px;
            transition: background 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 70px;
            -webkit-overflow-scrolling: touch;
        }

        .content-wrapper {
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
        }

        /* Tabs */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Bottom Navigation */
        nav.bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            border-top: 1px solid #E0E0E0;
            display: flex;
            justify-content: space-around;
            padding: max(12px, env(safe-area-inset-bottom, 12px)) 0 12px;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.08);
            max-width: 480px;
            margin: 0 auto;
            width: 100vw;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding:8px 16px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 12px;
            text-decoration: none;
            border: none;
            background: none;
            font-family: 'Comfortaa', sans-serif;
            transition: color 0.3s ease;
        }

        .nav-item.active {
            color: var(-primary-green);
        }

        .nav-item-icon {
            font-size: 24px;
        }

        /* Menu Tab */
        .day-filter {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 20px;
            padding-bottom: 8px;
        }

        .day-chip {
            padding: 8px 14px;
            border: 2px solid var(--button-green);
            background: var(--white);
            color: var(--primary-green);
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.3s ease;
            font-family: 'Oswald', sans-serif;
        }

        .day-chip.active {
            background: var(--primary-green);
            color: var(--white);
            border-color: var(--primary-green);
        }

        .day-chip:hover {
            border-color: var(--primary-green);
        }

        .day-card {
            background: var(--white);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: var(-shadow);
        }

        .day-header {
            background: var(--primary-green);
            color: var(--white);
            padding: 16px;
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            font-weight: 700;
        }

        .day-header.weekend {
            background: var(-dark-green);
        }

        .day-date {
            font-size: 14px;
            font-weight: 400;
            opacity: 0.9;
        }

        .meals {
            padding: 12px 0;
        }

        .meal {
            padding: 12px 16px;
            border-bottom: 1px solid #F0F0F0;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .meal:last-child {
            border-bottom: none;
        }

        .meal:hover {
            background: var(--light-bg);
        }

        .meal-type {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meal-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-green);
            margin: 6px 0;
        }

        .meal-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .meal-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: var(-light-bg);
            padding: 0 16px;
        }

        .meal-details.expanded {
            max-height: 500px;
            padding: 12px 16px;
        }

        .meal-details h4  {
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            color: var(--primary-green);
            margin: 12px 0 6px;
            font-weight: 700;
        }

        .meal-details p, .meal-details ul {
            font-size: 13px;
            color: var(--text-dark);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .meal-details ul {
            margin-left: 16px;
        }

        .meal-details li {
            margin-bottom: 4px;
        }

        /* Shopping Tab */
        .progress-section {
            margin-bottom: 20px;
        }

        .progress-label {
            font-size: 14px;
            font-weight: 700;
            color: var(-text-dark);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #E0E0E0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-green);
            transition: width 0.3s ease;
        }

        .reset-btn {
            padding: 8px 12px;
            background: var(--button-green);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-family: 'Comfortaa', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .reset-btn:hover {
            background: var(-primary-green);
        }

        .category {
            margin-bottom: 20px;
        }

        .category-header {
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-green);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-emoji {
            font-size: 20px;
        }

        .shopping-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--white);
            border-radius: 8px;
            margin-bottom: 8px;
            box-shadow: var(-shadow);
        }

        .shopping-item.completed {
            opacity: 0.6;
        }

        .shopping-item.completed .item-label {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .shopping-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary-green);
        }

        .item-label {
            flex: 1;
            font-size: 14px;
            color: var(--text-dark);
        }

        .item-price {
            font-weight: 700;
            color: var(--primary-green);
        }

        .item-category {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Contact Tab */
        .contact-card {
            background: var(--white);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .contact-header {
            font-size: 18px;
            font-weight: 700;
            color: var(-primary-green);
            margin-bottom: 12px;
            font-family: 'Oswald', sans-serif;
        }

        .contact-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #F0F0F0;
        }

        .contact-item.last {
            border-bottom: none;
        }

        .contact-label {
            font-weight: 700;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .contact-value {
            color: var(--primary-green);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .contact-value:hover {
            transform: scale(1.05);
        }

        .copy-btn {
            background: #E0E0E0;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .copy-btn:hover {
            background: #D0D0D0;
        }

        /* Stats Tab */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow),

        function renderDayFilter() {
            const filterContainer = document.getElementById('dayFilter');

                <button class="day-chip" data-day="${day}">${menuData[day].date}</button>

            document.querySelectorAll('.day-chip').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.day-chip').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    renderMenuDay(e.target.dataset.day);
                });
            });
        }

                    html += `

                    </div>

            );

            content.innerHTML = html;

        // Initialize (ohne Login)
        document.addEventListener('DOMContentLoaded', startApp);

        function startApp() {
            // Direkt starten ohne Login
            initializeContent();

            // Tab Navigation
            navItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    const tabId = item.getAttribute('data-tab');
                    switchTab(tabId);
                });
            });
        }

        function initializeContent() {
            renderMenu();
            initializeShopping();
            initializeTodos();
        }

        function switchTab(tabId) {
            tabContents.forEach(tab => tab.classList.remove('active'));
            navItems.forEach(item => item.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
        }

        // MENU TAB
        function renderMenu() {
            const dayFilter = document.getElementById('dayFilter');
            const menuContent = document.getElementById('menuContent');

            // Day filter
            const days = Object.keys(menuData);
            dayFilter.innerHTML = '';
            days.forEach((day, index) => {
                const chip = document.createElement('button');
                chip.className = 'day-chip' + (index === 0 ? ' active' : '');
                chip.textContent = day.slice(0, 2);
                chip.addEventListener('click', () => {
                    document.querySelectorAll('.day-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    renderDayCard(day, menuContent);
                });
                dayFilter.appendChild(chip);
            });

            // Initial render
            renderDayCard(days[0], menuContent);
        }

        function renderDayCard(day, container) {
            const dayInfo = menuData[day];
            const card = document.createElement('div');
            card.className = 'day-card';

            const headerClass = dayInfo.weekend ? 'day-header weekend' : 'day-header';
            card.innerHTML = `
                <div class="${headerClass}">
                    <div>${day}</div>
                    <div class="day-date">${dayInfo.date}</div>
                </div>
                <div class="meals"></div>
            `;

            const mealsContainer = card.querySelector('.meals');
            Object.entries(dayInfo.meals).forEach(([type, meal]) => {
                const mealEl = document.createElement('div');
                mealEl.className = 'meal';
                mealEl.innerHTML = `
                    <div class="meal-type">${type}</div>
                    <div class="meal-title">${meal.title}</div>
                    <div class="meal-time">⏱️ ${meal.time}</div>
                    <div class="meal-details">
                        <h4>Zutaten:</h4>
                        <p>${meal.ingredients}</p>
                        <h4>👶 Baby-Tipp für Lene:</h4>
                        <p>${meal.babyTip}</p>
                    </div>
                `;

                mealEl.addEventListener('click', () => {
                    const details = mealEl.querySelector('.meal-details');
                    details.classList.toggle('expanded');
                });

                mealsContainer.appendChild(mealEl);
            });

            container.innerHTML = '';
            container.appendChild(card);
        }

        // SHOPPING TAB
        function initializeShopping() {
            const shoppingRef = ref(db, 'shopping');
            onValue(shoppingRef, (snapshot) => {
                let shoppingState = snapshot.val() || {};

                // Initialize if empty
                if (Object.keys(shoppingState).length === 0) {
                    shoppingState = {};
                    Object.entries(shoppingDataInitial).forEach((catEntry, catIndex) => {
                        catEntry[1].items.forEach((item, itemIndex) => {
                            shoppingState[`${catIndex}-${itemIndex}`] = false;
                        });
                    });
                    set(shoppingRef, shoppingState);
                }

                renderShopping(shoppingState);
            });
        }

        function renderShopping(shoppingState) {
            const container = document.getElementById('shoppingContent');
            container.innerHTML = '';

            let totalItems = 0;
            let completedItems = 0;

            Object.entries(shoppingDataInitial).forEach((catEntry, catIndex) => {
                const [catName, catData] = catEntry;
                const category = document.createElement('div');
                category.className = 'category';

                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `<span class="category-emoji">${catData.emoji}</span><span>${catName}</span>`;
                category.appendChild(header);

                catData.items.forEach((item, itemIndex) => {
                    const key = `${catIndex}-${itemIndex}`;
                    const isChecked = shoppingState[key] || false;
                    totalItems++;
                    if (isChecked) completedItems++;

                    const itemEl = document.createElement('div');
                    itemEl.className = 'shopping-item' + (isChecked ? ' completed' : '');

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'shopping-checkbox';
                    checkbox.checked = isChecked;
                    checkbox.addEventListener('change', () => {
                        updateShopping(key, checkbox.checked);
                    });

                    const label = document.createElement('div');
                    label.className = 'item-label';
                    label.textContent = item;

                    itemEl.appendChild(checkbox);
                    itemEl.appendChild(label);
                    category.appendChild(itemEl);
                });

                container.appendChild(category);
            });

            // Update progress
            const progressLabel = document.getElementById('progressLabel');
            const progressFill = document.getElementById('progressFill');
            progressLabel.textContent = `${completedItems} von ${totalItems} erledigt`;
            progressFill.style.width = totalItems > 0 ? `${(completedItems / totalItems) * 100}%` : '0%';

            // Reset button
            document.getElementById('resetBtn').onclick = () => {
                const shoppingRef = ref(db, 'shopping');
                set(shoppingRef, {});
            };
        }

        function updateShopping(key, checked) {
            const shoppingRef = ref(db, `shopping/${key}`);
            set(shoppingRef, checked);
        }

        // TODOS TAB
        const todoForm = document.getElementById('todoForm');
        const todoInput = document.getElementById('todoInput');
        const whoSelector = document.getElementById('whoSelector');

        whoSelector.querySelectorAll('.who-chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                e.preventDefault();
                whoSelector.querySelectorAll('.who-chip').forEach(c => c.classList.remove('selected'));
                chip.classList.add('selected');
                selectedWho = chip.getAttribute('data-who');
            });
        });

        // Initialize first who as selected
        whoSelector.querySelector('[data-who="Michèle"]').classList.add('selected');

        todoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = todoInput.value.trim();
            if (!text) return;

            const todosRef = ref(db, 'todos');
            const newTodo = {
                text,
                who: selectedWho,
                completed: false,
                createdAt: new Date().toISOString()
            };

            try {
                const snapshot = await new Promise((resolve) => {
                    onValue(todosRef, resolve, { onlyOnce: true });
                });

                const existingTodos = snapshot.val() || {};
                const newKey = `todo_${Date.now()}`;
                existingTodos[newKey] = newTodo;

                set(todosRef, existingTodos);
                todoInput.value = '';
                todoInput.focus();
            } catch (error) {
                console.error('Error adding todo:', error);
            }
        });

        function initializeTodos() {
            const todosRef = ref(db, 'todos');
            onValue(todosRef, (snapshot) => {
                let todos = snapshot.val() || {};

                // Initialize if empty
                if (Object.keys(todos).length === 0) {
                    todos = {
                        'todo_1': {
                            text: 'Kinderarzt-Termin fuer Lene vereinbaren',
                            who: 'Michèle',
                            completed: false,
                            createdAt: new Date().toISOString()
                        },
                        'todo_2': {
                            text: 'Winterreifen wechseln lassen',
                            who: 'Alex',
                            completed: false,
                            createdAt: new Date().toISOString()
                        },
                        'todo_3': {
                            text: 'Geburtstagsgeschenk fuer Oma organisieren',
                            who: 'Michèle',
                            completed: false,
                            createdAt: new Date().toISOString()
                        }
                    };
                    set(todosRef, todos);
                }

                renderTodos(todos);
            });
        }

        function renderTodos(todos) {
            const container = document.getElementById('todosContent');
            container.innerHTML = '';

            const pending = [];
            const completed = [];

            Object.entries(todos).forEach(([id, todo]) => {
                if (todo.completed) {
                    completed.push([id, todo]);
                } else {
                    pending.push([id, todo]);
                }
            });

            if (pending.length === 0 && completed.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✅</div><div class="empty-state-text">Keine Todos - alles erledigt!</div></div>';
                return;
            }

            // Pending section
            if (pending.length > 0) {
                const section = document.createElement('div');
                section.className = 'todos-section';
                const title = document.createElement('div');
                title.className = 'todos-section-title';
                title.textContent = 'Ausstehend';
                section.appendChild(title);

                pending.forEach(([id, todo]) => {
                    const item = createTodoItem(id, todo, false);
                    section.appendChild(item);
                });

                container.appendChild(section);
            }

            // Completed section
            if (completed.length > 0) {
                const section = document.createElement('div');
                section.className = 'todos-section';
                const title = document.createElement('div');
                title.className = 'todos-section-title';
                title.textContent = 'Erledigt';
                section.appendChild(title);

                completed.forEach(([id, todo]) => {
                    const item = createTodoItem(id, todo, true);
                    section.appendChild(item);
                });

                container.appendChild(section);
            }
        }

        function createTodoItem(id, todo, isCompleted) {
            const item = document.createElement('div');
            item.className = 'todo-item' + (isCompleted ? ' completed' : '');

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'todo-checkbox';
            checkbox.checked = isCompleted;
            checkbox.addEventListener('change', () => {
                updateTodo(id, { ...todo, completed: !isCompleted });
            });

            const content = document.createElement('div');
            content.className = 'todo-content';

            const text = document.createElement('div');
            text.className = 'todo-text';
            text.textContent = todo.text;

            const who = document.createElement('div');
            who.className = 'todo-who';
            who.textContent = todo.who;

            content.appendChild(text);
            content.appendChild(who);

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'todo-delete';
            deleteBtn.textContent = '×';
            deleteBtn.addEventListener('click', () => {
                deleteTodo(id);
            });

            item.appendChild(checkbox);
            item.appendChild(content);
            item.appendChild(deleteBtn);

            return item;
        }

        function updateTodo(id, updatedTodo) {
            const todoRef = ref(db, `todos/${id}`);
            set(todoRef, updatedTodo);
        }

        function deleteTodo(id) {
            const todoRef = ref(db, `todos/${id}`);
            remove(todoRef);
        }
    </script>
